<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顏色訓練反應</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f4f8; font-family: sans-serif; overflow: hidden; }
        #app-container { position: relative; width: 100%; max-width: 500px; height: 100%; background: white; overflow: hidden; display: flex; flex-direction: column; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: white; z-index: 10; padding: 20px; box-sizing: border-box; }
        h1 { font-size: 28px; margin-bottom: 10px; }
        .btn { padding: 15px; margin: 10px; font-size: 18px; font-weight: bold; cursor: pointer; border: none; border-radius: 12px; color: white; width: 80%; }
        .btn-start { background: #27ae60; } .btn-esp { background: #2980b9; }
        
        /* 遊戲畫面 */
        #game-screen { display: none; background: #ecf0f1; }
        #status-bar { width: 100%; padding: 15px; background: #34495e; color: white; display: flex; justify-content: space-between; font-weight: bold; }
        
        /* 核心修改：響應式圓形容器 */
        #color-container { display: flex; flex-direction: column; justify-content: space-around; align-items: center; flex-grow: 1; width: 100%; padding: 20px 0; }
        .color-block { width: 120px; height: 120px; border-radius: 50%; opacity: 0.1; transition: 0.1s; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .color-block.active { opacity: 1; transform: scale(1.1); }
        
        /* 電腦橫向時改回橫排 */
        @media (min-width: 600px) {
            #app-container { max-width: 800px; height: 500px; border-radius: 15px; }
            #color-container { flex-direction: row; }
            .color-block { width: 150px; height: 150px; }
        }

        #btn-R { background: #e74c3c; border: 6px solid #c0392b; }
        #btn-Y { background: #f1c40f; border: 6px solid #f39c12; }
        #btn-B { background: #3498db; border: 6px solid #2980b9; }

        .time-box { font-size: 16px; color: #7f8c8d; margin-top: 5px; }
        .analysis-card { width: 90%; padding: 15px; border-radius: 10px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="menu-screen" class="screen">
        <h1>🧠 色彩反應大師</h1>
        <button class="btn btn-start" onclick="startGame()">▶️ 開始訓練</button>
        <button class="btn btn-esp" onclick="connectBLE()">🔗 藍牙連線 (手機推薦)</button>
        <button class="btn btn-esp" style="background:#8e44ad" onclick="connectSerial()">🔌 有線連線 (電腦推薦)</button>
        <div id="conn-msg" style="margin-top:10px; font-weight:bold;">等待連線...</div>
    </div>

    <div id="game-screen" class="screen">
        <div id="status-bar">
            <span>回合: <span id="ui-round">1/10</span></span>
            <span id="ui-timer">0.0s</span>
        </div>
        <div id="color-container">
            <div id="btn-R" class="color-block" onclick="handleInput('R')"></div>
            <div id="btn-Y" class="color-block" onclick="handleInput('Y')"></div>
            <div id="btn-B" class="color-block" onclick="handleInput('B')"></div>
        </div>
    </div>

    <div id="result-screen" class="screen" style="display:none;">
        <h1>📊 結算報告</h1>
        <div id="result-time-compare" class="time-box"></div>
        <h2 id="result-score" style="margin:10px 0;">分數：--</h2>
        <div id="result-analysis" class="analysis-card"></div>
        <button class="btn btn-start" onclick="returnToMenu()">返回主選單</button>
    </div>
</div>

<script>
    let bleChar = null, serialWriter = null;
    let gameStartTime, totalGameTime, roundTimer;
    const TOTAL_ROUNDS = 10;
    let currentRound = 0, scoreCount = 0, currentActiveColor = null, isWaiting = false;

    function updateStatus(msg, ok) {
        document.getElementById('conn-msg').innerText = msg;
        document.getElementById('conn-msg').style.color = ok ? "#27ae60" : "#e74c3c";
        if (ok) alert(msg);
    }

    async function sendCmd(c) {
        try {
            if (bleChar) await bleChar.writeValue(new TextEncoder().encode(c));
            if (serialWriter) await serialWriter.write(c + '\n');
        } catch (e) {}
    }

    function startGame() {
        currentRound = 0; scoreCount = 0;
        gameStartTime = Date.now(); // 記錄總開始時間
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        
        // 即時跳秒顯示
        roundTimer = setInterval(() => {
            const sec = ((Date.now() - gameStartTime) / 1000).toFixed(1);
            document.getElementById('ui-timer').innerText = sec + "s";
        }, 100);

        sendCmd("OFF_ALL");
        nextRound();
    }

    function nextRound() {
        if (currentRound >= TOTAL_ROUNDS) { endGame(); return; }
        currentRound++;
        document.getElementById('ui-round').innerText = `${currentRound}/${TOTAL_ROUNDS}`;
        isWaiting = false;
        document.querySelectorAll('.color-block').forEach(e => e.classList.remove('active'));
        sendCmd("OFF_ALL");

        setTimeout(() => {
            currentActiveColor = ['R','Y','B'][Math.floor(Math.random()*3)];
            document.getElementById(`btn-${currentActiveColor}`).classList.add('active');
            sendCmd(`ON_${currentActiveColor}`);
            isWaiting = true;
        }, Math.random() * 1500 + 1000);
    }

    function returnToMenu() {
        // 隱藏結算畫面，顯示主選單 (不會斷開連線！)
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('menu-screen').style.display = 'flex';
    }

    function handleInput(c) {
        if (!isWaiting) return;
        isWaiting = false;
        if (c === currentActiveColor) scoreCount++;
        sendCmd("OFF_ALL");
        setTimeout(nextRound, 500);
    }

    function endGame() {
        clearInterval(roundTimer);
        totalGameTime = ((Date.now() - gameStartTime) / 1000).toFixed(1); // 本次總秒數
        sendCmd("OFF_ALL");

        let lastTime = localStorage.getItem('last_total_time') || "--";
        let lastScore = parseInt(localStorage.getItem('last_score')) || 0;
        let lastAcc = parseInt(localStorage.getItem('last_acc')) || 0;
        const acc = (scoreCount / TOTAL_ROUNDS) * 100;

        // 顯示時間比較
        document.getElementById('result-time-compare').innerHTML = `本次耗時：${totalGameTime}s | 上次耗時：${lastTime}s`;
        document.getElementById('result-score').innerText = `分數：${scoreCount} / 10 (${acc}%)`;

        // 進步判斷邏輯
        let analysis = document.getElementById('result-analysis');
        if (scoreCount > lastScore || acc > lastAcc) {
            analysis.innerText = `📈 進步了！分數比上次高 ${scoreCount - lastScore} 分！`;
            analysis.style.background = "#d4edda"; analysis.style.color = "#155724";
        } else {
            analysis.innerText = `💪 持之以恆！再試一次，挑戰上次的紀錄吧！`;
            analysis.style.background = "#fff3cd"; analysis.style.color = "#856404";
        }

        // 存入紀錄
        localStorage.setItem('last_total_time', totalGameTime);
        localStorage.setItem('last_score', scoreCount);
        localStorage.setItem('last_acc', acc);

        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'flex';
        
        sendToDiscord(scoreCount, acc, totalGameTime, lastTime, analysis.innerText);
    }

    async function sendToDiscord(s, a, t, lt, msg) {
        const WEBHOOK = "https://discord.com/api/webhooks/1490915002364985415/IIiu_o6Y5k7sfA5vs3FbsXxyTk1clSHrBpeNSVv2FcmhTXARqtsc3npq3PXpIRmVTz96";
        if (!WEBHOOK.includes("http")) return;
        fetch(WEBHOOK, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                embeds: [{
                    title: "老年認知訓練戰報",
                    color: 3447003,
                    fields: [
                        { name: "🎯 本次得分", value: `${s} 分 (${a}%)`, inline: true },
                        { name: "⏱️ 本次耗時", value: `${t} 秒`, inline: true },
                        { name: "⌛ 上次耗時", value: `${lt} 秒`, inline: true },
                        { name: "📊 系統評價", value: msg, inline: false }
                    ]
                }]
            })
        });
    }

    // --- 連線代碼 (保持不變) ---
    async function connectBLE() {
        try {
            const dev = await navigator.bluetooth.requestDevice({ filters: [{ name: 'ESP32_Trainer' }], optionalServices: ["4fafc201-1fb5-459e-8fcc-c5c9c331914b"] });
            const srv = await dev.gatt.connect();
            const svc = await srv.getPrimaryService("4fafc201-1fb5-459e-8fcc-c5c9c331914b");
            bleChar = await svc.getCharacteristic("beb5483e-36e1-4688-b7f5-ea07361b26a8");
            await bleChar.startNotifications();
            bleChar.addEventListener('characteristicvaluechanged', e => {
                const m = new TextDecoder().decode(e.target.value).trim();
                if (['R','Y','B'].includes(m)) handleInput(m);
            });
            updateStatus("✅ 藍牙已連接", true);
        } catch (e) { updateStatus("❌ 連接失敗", false); }
    }

    async function connectSerial() {
        try {
            const p = await navigator.serial.requestPort();
            await p.open({ baudRate: 115200 });
            const out = new TextEncoderStream(); out.readable.pipeTo(p.writable);
            serialWriter = out.writable.getWriter();
            const ins = new TextDecoderStream(); p.readable.pipeTo(ins.writable);
            const rdr = ins.readable.getReader();
            updateStatus("✅ 有線已連接", true);
            while(true) {
                const {value, done} = await rdr.read();
                if (done) break;
                if (value && ['R','Y','B'].includes(value.trim())) handleInput(value.trim());
            }
        } catch (e) { updateStatus("❌ 連接失敗", false); }
    }
</script>
</body>
</html>
