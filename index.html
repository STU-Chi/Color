<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>銀髮族認知訓練：色彩反應大師</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f4f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }
        #app-container {
            position: relative;
            width: 800px;
            max-width: 100vw;
            height: 500px;
            max-height: 100vh;
            background-color: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-radius: 15px;
            overflow: hidden;
        }
        /* 主選單 & 結算畫面 */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: white;
            z-index: 10;
        }
        h1 { font-size: 42px; color: #2c3e50; margin-bottom: 20px; }
        p.subtitle { font-size: 20px; color: #7f8c8d; margin-bottom: 30px; }
        
        .btn {
            padding: 15px 30px; margin: 10px; font-size: 22px; font-weight: bold;
            cursor: pointer; border: none; border-radius: 10px;
            color: white; transition: 0.2s; width: 300px; max-width: 90%;
        }
        .btn-start { background-color: #27ae60; }
        .btn-start:hover { background-color: #2ecc71; }
        .btn-esp { background-color: #2980b9; }
        .btn-esp:hover { background-color: #3498db; }
        
        /* 遊戲畫面區塊 */
        #game-screen { z-index: 5; display: none; background-color: #ecf0f1; }
        #status-bar {
            width: 100%; padding: 15px; font-size: 24px; font-weight: bold;
            background-color: #34495e; color: white;
            display: flex; justify-content: space-around;
            box-sizing: border-box;
        }
        #color-container {
            display: flex; justify-content: center; align-items: center;
            height: calc(100% - 60px); gap: 30px;
        }
        /* 三色大按鈕 (畫面上顯示用) */
        .color-block {
            width: 150px; height: 150px; border-radius: 50%;
            cursor: pointer; opacity: 0.2; /* 預設變暗 */
            transition: opacity 0.1s, transform 0.1s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .color-block.active {
            opacity: 1; transform: scale(1.1); /* 亮起並放大 */
        }
        .color-block:active { transform: scale(0.95); }
        
        #btn-R { background-color: #e74c3c; border: 8px solid #c0392b; }
        #btn-Y { background-color: #f1c40f; border: 8px solid #f39c12; }
        #btn-B { background-color: #3498db; border: 8px solid #2980b9; }

        /* 手機版適配 */
        @media (max-width: 600px) {
            h1 { font-size: 32px; }
            .color-block { width: 100px; height: 100px; }
            #color-container { gap: 15px; }
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="menu-screen" class="screen">
        <h1>🧠 色彩反應大師</h1>
        <p class="subtitle">訓練手眼協調與色彩辨識</p>
        <button class="btn btn-start" onclick="startGame()">▶️ 直接在螢幕上玩</button>
        <button class="btn btn-esp" onclick="connectBLE()">🔗 連接藍牙 ESP32 搖桿</button>
        <button class="btn btn-esp" style="background-color: #8e44ad;" onclick="connectSerial()">🔌 連接有線 ESP32 搖桿</button>
        <div id="connection-status" style="margin-top:20px; font-weight:bold; color:#7f8c8d;">尚未連接裝置</div>
    </div>

    <div id="game-screen" class="screen" style="display:none;">
        <div id="status-bar">
            <span>回合: <span id="ui-round">1/10</span></span>
            <span>提示：請按下亮起的顏色！</span>
        </div>
        <div id="color-container">
            <div id="btn-R" class="color-block" onclick="handleInput('R')"></div>
            <div id="btn-Y" class="color-block" onclick="handleInput('Y')"></div>
            <div id="btn-B" class="color-block" onclick="handleInput('B')"></div>
        </div>
    </div>

    <div id="result-screen" class="screen" style="display:none;">
        <h1>📊 訓練結算</h1>
        <h2 id="result-acc">正確率：--%</h2>
        <h2 id="result-time">平均反應時間：-- ms</h2>
        <p id="result-analysis" style="font-size: 20px; font-weight: bold; color: #27ae60;"></p>
        <button class="btn btn-start" onclick="returnToMenu()">返回主選單</button>
    </div>
</div>

<script>
    // ==========================================
    // --- 遊戲核心邏輯 ---
    // ==========================================
    const TOTAL_ROUNDS = 10; // 總共玩 10 個亮燈
    let currentRound = 0;
    let scoreCount = 0;
    let reactionTimes = [];
    let currentActiveColor = null; // 當前亮起的顏色: 'R', 'Y', 'B'
    let lightUpTime = 0;           // 記錄亮燈的瞬間時間
    let gameTimer = null;
    let isWaitingForInput = false;

    function showScreen(screenId) {
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById(screenId).style.display = 'flex';
    }

    function startGame() {
        currentRound = 0;
        scoreCount = 0;
        reactionTimes = [];
        showScreen('game-screen');
        nextRound();
    }

    function nextRound() {
        if (currentRound >= TOTAL_ROUNDS) {
            endGame();
            return;
        }
        
        currentRound++;
        document.getElementById('ui-round').innerText = `${currentRound}/${TOTAL_ROUNDS}`;
        isWaitingForInput = false;

        // 關閉所有燈光
        document.querySelectorAll('.color-block').forEach(el => el.classList.remove('active'));

        // 隨機等待 1~2.5 秒後亮燈 (防止預判)
        const randomDelay = Math.floor(Math.random() * 1500) + 1000;
        gameTimer = setTimeout(() => {
            // 隨機選一個顏色
            const colors = ['R', 'Y', 'B'];
            currentActiveColor = colors[Math.floor(Math.random() * colors.length)];
            
            // 亮起該顏色
            document.getElementById(`btn-${currentActiveColor}`).classList.add('active');
            
            lightUpTime = Date.now(); // 記錄亮燈時間
            isWaitingForInput = true;
        }, randomDelay);
    }

    // 處理玩家輸入 (滑鼠點擊或 ESP32 傳來的訊號)
    // inputColor 必須是 'R', 'Y', 或 'B'
    function handleInput(inputColor) {
        if (!isWaitingForInput) return; // 燈還沒亮不準按
        
        const reactionTime = Date.now() - lightUpTime;
        isWaitingForInput = false;
        
        if (inputColor === currentActiveColor) {
            scoreCount++; // 按對了
            reactionTimes.push(reactionTime); // 紀錄反應時間
        } else {
            // 按錯了給一個懲罰時間 2000ms
            reactionTimes.push(2000); 
        }

        // 關閉燈光，進入下一回合
        document.querySelectorAll('.color-block').forEach(el => el.classList.remove('active'));
        clearTimeout(gameTimer);
        setTimeout(nextRound, 500); // 休息 0.5 秒
    }

    function endGame() {
        // 計算成績
        const accuracy = Math.round((scoreCount / TOTAL_ROUNDS) * 100);
        let avgTime = 0;
        if (reactionTimes.length > 0) {
            const total = reactionTimes.reduce((a, b) => a + b, 0);
            avgTime = Math.round(total / reactionTimes.length);
        }

        document.getElementById('result-acc').innerText = `正確率：${accuracy}%`;
        document.getElementById('result-time').innerText = `平均反應時間：${avgTime} 毫秒`;

        // 準備發送給 Discord 與分析
        const sessionData = {
            date: new Date().toLocaleString(),
            score: scoreCount,
            accuracy: accuracy,
            avgReactionTime: avgTime
        };
        sendToDiscordAndAnalyze(sessionData);

        showScreen('result-screen');
    }

    function returnToMenu() {
        showScreen('menu-screen');
    }

    // ==========================================
    // --- Discord Webhook 與分析邏輯 ---
    // ==========================================
    async function sendToDiscordAndAnalyze(sessionData) {
        // ⚠️ 請在這裡貼上你申請的 Discord Webhook 網址
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1490915002364985415/IIiu_o6Y5k7sfA5vs3FbsXxyTk1clSHrBpeNSVv2FcmhTXARqtsc3npq3PXpIRmVTz96"; 
        
        // 讀取歷史平均時間
        let historyAvgTime = localStorage.getItem('dementia_history_time') || 1500;
        let progressMsg = "";
        let timeDifference = historyAvgTime - sessionData.avgReactionTime;
        
        if (timeDifference > 50) {
            progressMsg = `🟢 **大幅進步！** 反應時間比過去快了 ${Math.round(timeDifference)} ms！狀態極佳！`;
            document.getElementById('result-analysis').style.color = '#27ae60';
        } else if (timeDifference < -50) {
            progressMsg = `🔴 **稍微退步** 反應時間慢了 ${Math.round(Math.abs(timeDifference))} ms。可能較疲勞。`;
            document.getElementById('result-analysis').style.color = '#e74c3c';
        } else {
            progressMsg = `🟡 **維持水準** 表現十分穩定，繼續保持！`;
            document.getElementById('result-analysis').style.color = '#f39c12';
        }

        document.getElementById('result-analysis').innerText = progressMsg.replace(/[*_]/g, ''); // UI上移除Markdown符號

        // 更新歷史紀錄
        let newAvgTime = (parseInt(historyAvgTime) + sessionData.avgReactionTime) / 2;
        localStorage.setItem('dementia_history_time', newAvgTime);

        if (WEBHOOK_URL === "請貼上你的_DISCORD_WEBHOOK_網址") {
            console.log("未設定 Discord Webhook，略過發送。");
            return;
        }

        const payload = {
            username: "銀髮訓練機器人 🤖",
            embeds: [{
                title: "📋 每日認知與肢體訓練報告",
                color: sessionData.accuracy >= 80 ? 3066993 : 15158332, // 高正確率綠色，低正確率紅色
                fields: [
                    { name: "🕒 測驗時間", value: sessionData.date, inline: false },
                    { name: "🎯 命中率", value: `${sessionData.score}/${TOTAL_ROUNDS} (${sessionData.accuracy}%)`, inline: true },
                    { name: "⚡ 平均反應時間", value: `${sessionData.avgReactionTime} ms`, inline: true },
                    { name: "📈 系統分析", value: progressMsg, inline: false }
                ]
            }]
        };

        try {
            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            console.log("✅ 戰報已發送至 Discord！");
        } catch (error) {
            console.error("❌ Discord 發送失敗:", error);
        }
    }

    // ==========================================
    // --- ESP32 硬體連線 (藍牙/有線) 預留通道 ---
    // ==========================================
    
    // 收到 ESP32 訊號時的處理函式，預計收到 'R', 'Y', 或 'B'
    function processESP32Signal(message) {
        if (message.includes('R')) handleInput('R');
        else if (message.includes('Y')) handleInput('Y');
        else if (message.includes('B')) handleInput('B');
    }

    // --- Web Bluetooth ---
    const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
    async function connectBLE() {
        try {
            const bleDevice = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'ESP32_Trainer' }], // 之後把 ESP32 名字改成這個
                optionalServices: [SERVICE_UUID]
            });
            const server = await bleDevice.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            const characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
            await characteristic.startNotifications();
            
            characteristic.addEventListener('characteristicvaluechanged', (e) => {
                const msg = new TextDecoder('utf-8').decode(e.target.value).trim();
                processESP32Signal(msg);
            });
            
            document.getElementById('connection-status').innerText = "✅ 藍牙搖桿已連接";
            document.getElementById('connection-status').style.color = "#2980b9";
        } catch (error) { console.error('藍牙連線失敗:', error); }
    }

    // --- Web Serial ---
    async function connectSerial() {
        try {
            const port = await navigator.serial.requestPort();
            await port.open({ baudRate: 115200 });
            document.getElementById('connection-status').innerText = "✅ 有線搖桿已連接";
            document.getElementById('connection-status').style.color = "#8e44ad";
            
            const textDecoder = new TextDecoderStream();
            port.readable.pipeTo(textDecoder.writable);
            const reader = textDecoder.readable.getReader();
            let buffer = "";
            
            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                if (value) {
                    buffer += value;
                    if (buffer.includes('R') || buffer.includes('Y') || buffer.includes('B')) {
                        processESP32Signal(buffer);
                        buffer = ""; 
                    }
                    if (buffer.length > 10) buffer = ""; // 防溢位
                }
            }
        } catch (error) { console.error('序列埠連線失敗:', error); }
    }
</script>

</body>
</html>
