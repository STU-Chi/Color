<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#3498db">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3048/3048122.png">
    
    <title>健康樂活揮手大挑戰</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet@2.2.2/dist/posenet.min.js"></script>
    
    <style>
        body { font-family: '微軟正黑體', sans-serif; background-color: #f0f8ff; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; text-align: center; }
        #app-container { width: 100%; max-width: 800px; height: 100%; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        h1 { color: #2c3e50; font-size: 2em; margin: 10px 0; padding: 0 10px; }
        p.desc { font-size: 1.1em; color: #7f8c8d; }

        .btn { display: inline-block; padding: 15px 30px; font-size: 1.5em; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        #btn-start { background: linear-gradient(45deg, #FF512F, #DD2476); color: white; margin-top: 20px; }
        #btn-start:disabled { background: #bdc3c7; cursor: wait; }

        /* 讓遊戲區域完美貼合螢幕，解決座標錯亂 */
        #game-area { display: none; position: relative; width: 100%; max-width: 640px; background: #000; overflow: hidden; }
        #video { width: 100%; height: auto; transform: scaleX(-1); display: block; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        
        #ui-layer { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; font-size: 1.8em; font-weight: bold; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); z-index: 10; }
        #loading-status { font-size: 1.2em; color: #f39c12; margin-top: 20px; display: none; font-weight: bold; }
        
        #result-screen { display: none; flex-direction: column; justify-content: center; align-items: center; gap: 15px; width: 100%; }
        #final-photo-canvas { border: 5px solid white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); max-width: 90%; height: auto; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="main-menu">
        <h1>健康樂活揮手大挑戰</h1>
        <p class="desc">請將手機放好，面對鏡頭揮動手臂！</p>
        <div id="loading-status">🔄 AI 啟動中，請稍候...</div>
        <button id="btn-start" class="btn" onclick="initGame()" disabled>載入中...</button>
    </div>

    <div id="game-area">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="game-canvas"></canvas>
        <div id="ui-layer">
            <div>分數: <span id="score" style="color: #f1c40f;">0</span></div>
            <div>時間: <span id="timer">30</span>s</div>
        </div>
    </div>

    <div id="result-screen">
        <h2>🎉 訓練完成！</h2>
        <canvas id="final-photo-canvas"></canvas>
        <p style="font-size: 1.8em; font-weight: bold;">得分: <span id="final-score" style="color: #e74c3c;">0</span></p>
        <p id="upload-status" style="font-size: 1.1em; color: #7f8c8d;"></p>
        <button class="btn" style="background:#3498db; color:white;" onclick="location.reload()">再玩一次</button>
    </div>
</div>

<script>
    // 記得將這行換成您的 Discord Webhook
    const DISCORD_WEBHOOK_URL = "YOUR_DISCORD_WEBHOOK_URL_HERE"; 
    
    let net, video = document.getElementById('video'), canvas = document.getElementById('game-canvas'), ctx = canvas.getContext('2d');
    let score = 0, timeLeft = 30, timerInterval, isGameRunning = false;
    let target = { x: 0, y: 0, radius: 40, active: false }; // 紅點半徑稍微縮小，更適合手機

    window.onload = async () => {
        document.getElementById('loading-status').style.display = 'block';
        try {
            net = await posenet.load({ architecture: 'MobileNetV1', outputStride: 16, multiplier: 0.75 });
            document.getElementById('loading-status').style.display = 'none';
            let startBtn = document.getElementById('btn-start');
            startBtn.innerText = "開始挑戰！"; startBtn.disabled = false;
        } catch (e) { alert("模型載入失敗，請檢查網路。"); }
    };

    async function initGame() {
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';

        try {
            // 使用手機前置鏡頭
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
            video.srcObject = stream;
            
            // 等待影片確實讀取到尺寸後再繼續
            video.onloadeddata = () => {
                // 讓畫布跟影片的真實畫素完全 1:1 對齊
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                isGameRunning = true; score = 0; timeLeft = 30;
                document.getElementById('score').innerText = score;
                document.getElementById('timer').innerText = timeLeft;
                
                spawnTarget(); gameLoop();
                timerInterval = setInterval(() => {
                    timeLeft--; document.getElementById('timer').innerText = timeLeft;
                    if (timeLeft <= 0) endGame();
                }, 1000);
            };
        } catch (e) { alert("無法開啟鏡頭，請確認是否允許相機權限。"); location.reload(); }
    }

    async function gameLoop() {
        if (!isGameRunning) return;

        // 【修復關鍵 2】這裡改為 false。讓畫面翻轉交給 CSS 就好，AI 專心抓原始座標，才不會打架
        const pose = await net.estimateSinglePose(video, { flipHorizontal: false });
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (target.active) {
            ctx.beginPath();
            ctx.arc(target.x, target.y, target.radius, 0, 2 * Math.PI);
            ctx.fillStyle = "#e74c3c"; ctx.fill();
            ctx.lineWidth = 5; ctx.strokeStyle = "white"; ctx.stroke();
            ctx.closePath();
        }

        const leftWrist = pose.keypoints.find(k => k.part === 'leftWrist');
        const rightWrist = pose.keypoints.find(k => k.part === 'rightWrist');

        checkHit(leftWrist);
        checkHit(rightWrist);

        // 畫出綠色點點，幫助我們確認 AI 有抓到手
        drawPoint(ctx, leftWrist);
        drawPoint(ctx, rightWrist);

        requestAnimationFrame(gameLoop);
    }

    function spawnTarget() {
        const padding = target.radius + 20;
        target.x = Math.random() * (canvas.width - padding * 2) + padding;
        target.y = Math.random() * (canvas.height - padding * 2) + padding;
        if (target.y < canvas.height * 0.25) target.y += canvas.height * 0.25; 
        target.active = true;
    }

    function checkHit(keypoint) {
        if (!target.active || keypoint.score < 0.2) return;
        const dx = keypoint.position.x - target.x, dy = keypoint.position.y - target.y;
        if (Math.sqrt(dx*dx + dy*dy) < target.radius) {
            score += 10; document.getElementById('score').innerText = score;
            target.active = false; setTimeout(spawnTarget, 200); 
        }
    }

    function drawPoint(ctx, kp) {
        if (kp.score > 0.2) {
            ctx.beginPath(); ctx.arc(kp.position.x, kp.position.y, 15, 0, 2 * Math.PI);
            ctx.fillStyle = "#2ecc71"; ctx.fill(); ctx.closePath();
        }
    }

    function endGame() {
        isGameRunning = false; clearInterval(timerInterval);
        document.getElementById('game-area').style.display = 'none';
        document.getElementById('result-screen').style.display = 'flex';
        document.getElementById('final-score').innerText = score;

        const finalCanvas = document.getElementById('final-photo-canvas');
        finalCanvas.width = canvas.width; finalCanvas.height = canvas.height;
        const finalCtx = finalCanvas.getContext('2d');
        
        finalCtx.save(); finalCtx.scale(-1, 1);
        finalCtx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
        finalCtx.restore();

        finalCtx.font = "bold 40px 微軟正黑體"; finalCtx.fillStyle = "white"; finalCtx.strokeStyle = "black"; finalCtx.lineWidth = 2;
        finalCtx.fillText("得分: " + score, 20, canvas.height - 30); finalCtx.strokeText("得分: " + score, 20, canvas.height - 30);

        video.srcObject.getTracks().forEach(track => track.stop());
        uploadResultToDiscord(finalCanvas);
    }

    function uploadResultToDiscord(canvasElement) {
        if (DISCORD_WEBHOOK_URL === "YOUR_DISCORD_WEBHOOK_URL_HERE") return;
        document.getElementById('upload-status').innerText = "上傳照片中...";
        canvasElement.toBlob(async (blob) => {
            const formData = new FormData();
            formData.append('file', blob, 'daily_training.jpg');
            formData.append('payload_json', JSON.stringify({ content: `長輩視訊復健訓練回報 (得分: **${score}**) 分` }));
            try {
                await fetch(DISCORD_WEBHOOK_URL, { method: 'POST', body: formData });
                document.getElementById('upload-status').innerText = "✅ 已傳送至 Discord！";
            } catch (error) { document.getElementById('upload-status').innerText = "❌ 上傳失敗。"; }
        }, 'image/jpeg', 0.8);
    }
</script>

</body>
</html>
